<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>缴费未完成 - 长沙砺剑军事夏令营</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-dark:#1a3a0a;
  --green:#2d5016;
  --green-light:#3a6b1e;
  --khaki:#b8973e;
  --khaki-light:#d4b872;
  --red:#b71c1c;
  --red-light:#e53935;
  --bg-dark:#121212;
  --bg-section:#f5f0e8;
  --text:#222;
  --text-light:#555;
  --white:#fff;
  --radius:12px;
  --radius-sm:8px;
}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  color:var(--text);
  background:linear-gradient(135deg,#1a0a0a 0%,#2d1010 30%,#501616 60%,#2d1010 100%);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(180,80,60,.1) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 50%,rgba(180,80,60,.06) 0%,transparent 50%);
  pointer-events:none;
}
.card{
  position:relative;z-index:1;
  background:var(--white);border-radius:var(--radius);
  padding:48px 32px;text-align:center;
  max-width:460px;width:100%;
  box-shadow:0 8px 40px rgba(0,0,0,.35);
  border-top:5px solid var(--red);
  animation:cardIn .5s ease;
}
@keyframes cardIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.x-circle{
  width:100px;height:100px;border-radius:50%;
  background:linear-gradient(135deg,#c62828,#e53935);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;font-size:3rem;color:#fff;
  box-shadow:0 6px 24px rgba(198,40,40,.4);
  animation:pop .5s ease .2s both;
}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.card h1{font-size:1.6rem;color:#b71c1c;margin-bottom:8px;letter-spacing:1px}
.card .subtitle{font-size:.92rem;color:var(--text-light);margin-bottom:24px}
.alert-box{
  background:#fff5f5;border:1px solid #ffcdd2;
  border-radius:var(--radius-sm);
  padding:18px;text-align:left;margin-bottom:20px;
  font-size:.88rem;color:#c62828;line-height:1.8;
}
.alert-box strong{display:block;margin-bottom:6px}
.options-box{
  background:#fafaf7;border-radius:var(--radius-sm);
  padding:20px;text-align:left;margin-bottom:24px;
  font-size:.88rem;line-height:2;
}
.options-box .title{font-weight:700;color:var(--green-dark);margin-bottom:6px}
.options-box li{color:var(--text-light);margin-left:18px}
.contact{
  background:linear-gradient(135deg,#fff9e6,#fff3cd);
  border:1px dashed var(--khaki);border-radius:var(--radius-sm);
  padding:14px 18px;font-size:.85rem;color:#8b6914;
  margin-bottom:20px;line-height:1.8;
}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{
  display:inline-block;padding:14px 28px;border-radius:50px;
  font-size:1rem;font-weight:700;text-decoration:none;cursor:pointer;
  border:none;transition:all .3s;letter-spacing:1px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--red),var(--red-light));
  color:var(--white);box-shadow:0 6px 24px rgba(183,28,28,.4);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(183,28,28,.6)}
.btn-outline{
  background:transparent;color:var(--green-dark);
  border:2px solid var(--green);
}
.btn-outline:hover{background:rgba(45,80,22,.06);transform:translateY(-2px)}
.footer-text{font-size:.78rem;color:#999;margin-top:20px}

@media(max-width:480px){
  .card{padding:32px 18px}
  .x-circle{width:80px;height:80px;font-size:2.4rem}
  .card h1{font-size:1.3rem}
  .btn-row{flex-direction:column}
  .btn{width:100%;text-align:center}
}
</style>
</head>
<body>

<div class="card">
  <div class="x-circle">✕</div>
  <h1>缴费未完成</h1>
  <p class="subtitle">您已取消支付或支付未成功</p>

  <div class="alert-box">
    <strong>⚠️ 注意：名额尚未锁定</strong>
    您的报名信息已暂存，但未完成缴费前，名额可能会被其他学员占用。建议尽快完成支付以确保名额。
  </div>

  <div class="options-box">
    <div class="title">🔁 您可以选择：</div>
    <ol>
      <li>返回报名页<strong>重新提交</strong>，再次进入缴费通道</li>
      <li>直接联系教官<strong>线下缴费</strong></li>
      <li>如有疑问，拨打下方电话咨询</li>
    </ol>
  </div>

  <div class="contact">
    <strong>📞 联系方式：</strong><br>
    电话：18397642006 &nbsp;|&nbsp; 微信：Z15673229057<br>
    地址：长沙市春华山国防教育基地
  </div>

  <div class="btn-row">
    <a href="index.html#register" class="btn btn-primary">🔄 重新报名缴费</a>
    <a href="index.html" class="btn btn-outline">🏠 返回首页</a>
  </div>
  <p class="footer-text">© 2026 长沙砺剑军事夏令营</p>
</div>

</body>
</html>
