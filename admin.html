<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>砺剑夏令营 - 后台管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-dark:#1a3a0a;--green:#2d5016;--green-light:#3a6b1e;
  --khaki:#b8973e;--khaki-light:#d4b872;--red:#b71c1c;--red-light:#e53935;
  --bg:#f0ece0;--white:#fff;--text:#222;--text-light:#666;
  --shadow:0 2px 12px rgba(0,0,0,.08);--radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* 登录遮罩 */
.login-overlay{
  position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0d1f05,#1a3a0a,#2d5016);
  display:flex;align-items:center;justify-content:center;
}
.login-box{
  background:var(--white);border-radius:16px;padding:40px 32px;width:380px;max-width:90%;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.login-box .logo{font-size:2.5rem;margin-bottom:8px}
.login-box h2{font-size:1.3rem;color:var(--green-dark);margin-bottom:4px}
.login-box .sub{font-size:.82rem;color:var(--text-light);margin-bottom:24px}
.login-box input{
  width:100%;padding:14px 16px;border:2px solid #e0dcd0;border-radius:8px;
  font-size:1rem;text-align:center;letter-spacing:4px;margin-bottom:16px;
  font-family:inherit;
}
.login-box input:focus{outline:none;border-color:var(--green)}
.login-box button{
  width:100%;padding:14px;background:var(--green);color:var(--white);
  border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;
  letter-spacing:2px;transition:all .2s;
}
.login-box button:hover{background:var(--green-light)}
.login-box .err{color:var(--red-light);font-size:.82rem;margin-top:8px;display:none}
.login-box .hint{font-size:.75rem;color:#999;margin-top:12px}

/* 主界面 */
.admin-header{
  background:linear-gradient(135deg,var(--green-dark),var(--green));
  color:var(--white);padding:16px 24px;display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.admin-header h1{font-size:1.2rem;letter-spacing:1px}
.admin-header .user-info{font-size:.82rem;opacity:.8}
.admin-header button{
  background:rgba(255,255,255,.15);color:var(--white);border:1px solid rgba(255,255,255,.2);
  padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;transition:all .2s;
}
.admin-header button:hover{background:rgba(255,255,255,.25)}

.admin-main{max-width:1400px;margin:0 auto;padding:20px 16px}

/* 统计卡片 */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:var(--white);border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);border-left:4px solid var(--green);
}
.stat-card .label{font-size:.78rem;color:var(--text-light);letter-spacing:1px;margin-bottom:4px}
.stat-card .num{font-size:2rem;font-weight:900;color:var(--green-dark)}
.stat-card:nth-child(2){border-left-color:var(--khaki)}
.stat-card:nth-child(2) .num{color:#8b6914}
.stat-card:nth-child(3){border-left-color:var(--red)}
.stat-card:nth-child(3) .num{color:var(--red)}
.stat-card:nth-child(4){border-left-color:#1976d2}
.stat-card:nth-child(4) .num{color:#1976d2}

/* 工具栏 */
.toolbar{
  display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;
}
.toolbar select,.toolbar input{
  padding:10px 14px;border:2px solid #d5cfc0;border-radius:8px;
  font-size:.9rem;background:var(--white);font-family:inherit;
}
.toolbar select:focus,.toolbar input:focus{outline:none;border-color:var(--green)}
.toolbar .spacer{flex:1}
.toolbar button{
  padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;
  font-weight:700;cursor:pointer;transition:all .2s;
}
.btn-add{background:var(--red);color:var(--white)}
.btn-add:hover{background:var(--red-light)}
.btn-export{background:var(--khaki);color:var(--white)}
.btn-export:hover{background:#a08130}
.btn-clear{background:#999;color:var(--white)}
.btn-clear:hover{background:#777}

/* 表格 */
.table-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap thead{background:var(--green-dark);color:var(--khaki-light)}
.table-wrap th{padding:12px 10px;font-size:.82rem;letter-spacing:1px;text-align:left;white-space:nowrap}
.table-wrap td{padding:10px;font-size:.85rem;border-bottom:1px solid #eee}
.table-wrap tbody tr:hover{background:#f9f7f2}
.table-wrap .badge{
  display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:700;
}
.badge-7{background:#e8f5e9;color:#2e7d32}
.badge-14{background:#fff3e0;color:#e65100}
.badge-21{background:#e3f2fd;color:#1565c0}
.badge-28{background:#fce4ec;color:#c62828}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state .icon{font-size:3rem;margin-bottom:12px}

/* 弹窗 */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:9998;
  background:rgba(0,0,0,.6);align-items:center;justify-content:center;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--white);border-radius:var(--radius);padding:28px;max-width:500px;
  width:90%;max-height:80vh;overflow-y:auto;animation:in .25s ease;
}
@keyframes in{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{color:var(--green-dark);margin-bottom:16px}
.modal .row{margin-bottom:10px;display:flex;gap:8px}
.modal .row .key{font-weight:700;min-width:80px;color:var(--text-light);font-size:.85rem}
.modal .row .val{font-size:.9rem;flex:1}
.modal .close-btn{
  display:block;margin:20px auto 0;padding:10px 32px;
  background:var(--green);color:var(--white);border:none;
  border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;
}

/* 手动录入表单 */
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.add-form .full{grid-column:1/-1}
.add-form label{font-size:.82rem;font-weight:700;color:var(--text)}
.add-form input,.add-form select,.add-form textarea{
  width:100%;padding:10px;border:2px solid #e0dcd0;border-radius:6px;
  font-size:.88rem;font-family:inherit;background:#fafaf7;
}
.add-form input:focus,.add-form select:focus,.add-form textarea:focus{outline:none;border-color:var(--green)}
.add-form textarea{resize:vertical;min-height:60px}

/* 提示条 */
.tip-bar{
  background:#fff9e6;border:1px dashed var(--khaki);border-radius:8px;
  padding:12px 18px;margin-bottom:20px;font-size:.82rem;color:#8b6914;line-height:1.8;
}

@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-card .num{font-size:1.5rem}
  .toolbar{flex-direction:column}
  .toolbar select,.toolbar input{width:100%}
  .toolbar .spacer{display:none}
  .add-form{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="logo">🎖️</div>
    <h2>砺剑夏令营 · 后台管理</h2>
    <p class="sub">请输入管理密码</p>
    <input type="password" id="passwordInput" placeholder="输入密码" autofocus>
    <button onclick="doLogin()">登 录</button>
    <p class="err" id="loginError">密码错误，请重试</p>
    <p class="hint">数据存储在浏览器本地，无需服务器</p>
  </div>
</div>

<!-- 主界面 -->
<div id="mainApp" style="display:none">
  <header class="admin-header">
    <div>
      <h1>🎖️ 砺剑军事夏令营 · 报名管理</h1>
      <span class="user-info">📱 纯前端模式 · 数据存储在本机</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <div class="admin-main">
    <!-- 提示 -->
    <div class="tip-bar">
      💡 <strong>使用说明：</strong>报名数据保存在<strong>当前浏览器</strong>中。
      如果你用自己的手机/电脑帮家长填写报名表单，数据会自动出现在这里。
      建议定期「导出CSV」备份数据。
    </div>

    <!-- 统计卡片 -->
    <div class="stats-row">
      <div class="stat-card"><div class="label">总报名人数</div><div class="num" id="statTotal">0</div></div>
      <div class="stat-card"><div class="label">今日新增</div><div class="num" id="statToday">0</div></div>
      <div class="stat-card"><div class="label">男生 / 女生</div><div class="num" id="statGender">-</div></div>
      <div class="stat-card"><div class="label">营期分布</div><div class="num" id="statSessions" style="font-size:1rem">-</div></div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <select id="filterSession" onchange="renderTable()">
        <option value="">全部营期</option>
        <option value="7天">7天营期</option>
        <option value="14天">14天营期</option>
        <option value="21天">21天营期</option>
        <option value="28天">28天营期</option>
      </select>
      <input type="text" id="filterName" placeholder="搜索姓名..." oninput="renderTable()">
      <div class="spacer"></div>
      <button class="btn-add" onclick="openAddForm()">＋ 手动录入</button>
      <button class="btn-export" onclick="exportCSV()">📥 导出 CSV</button>
      <button class="btn-export" style="background:#1976d2;color:#fff" onclick="syncToCloud()">☁️ 云端同步</button>
      <button class="btn-clear" onclick="clearAll()">🗑 清空数据</button>
    </div>

    <!-- 表格 -->
    <div class="table-wrap">
      <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>序号</th><th>姓名</th><th>性别</th><th>年龄</th><th>手机号</th>
            <th>监护人</th><th>监护人电话</th><th>营期</th><th>报名时间</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="icon">📭</div><p>暂无报名数据</p>
        <p style="font-size:.8rem;margin-top:4px">通过网站报名表单或「手动录入」来添加数据</p>
      </div>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detailContent"></div>
</div>

<!-- 手动录入弹窗 -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAdd()">
  <div class="modal" style="max-width:580px">
    <h3>📝 手动录入报名信息</h3>
    <div class="add-form">
      <div><label>学员姓名 *</label><input type="text" id="addName" placeholder="请输入"></div>
      <div><label>性别 *</label><select id="addGender"><option value="">请选择</option><option value="男">男</option><option value="女">女</option></select></div>
      <div><label>年龄 *</label><input type="number" id="addAge" min="6" max="16" placeholder="6-16"></div>
      <div><label>身份证号 *</label><input type="text" id="addIdCard" placeholder="18位"></div>
      <div><label>手机号 *</label><input type="tel" id="addPhone" placeholder="11位"></div>
      <div><label>监护人 *</label><input type="text" id="addParentName" placeholder="监护人姓名"></div>
      <div><label>监护人电话 *</label><input type="tel" id="addParentPhone" placeholder="11位"></div>
      <div><label>营期 *</label><select id="addSession"><option value="">请选择</option><option value="7天">7天</option><option value="14天">14天</option><option value="21天">21天</option><option value="28天">28天</option></select></div>
      <div class="full"><label>健康状况</label><input type="text" id="addHealth" placeholder="选填"></div>
      <div class="full"><label>备注</label><textarea id="addRemarks" placeholder="选填"></textarea></div>
    </div>
    <div style="display:flex;gap:12px;margin-top:16px;justify-content:center">
      <button class="close-btn" onclick="saveAdd()">✅ 保存</button>
      <button class="close-btn" style="background:#999" onclick="closeAdd()">取消</button>
    </div>
    <p id="addError" style="color:var(--red-light);font-size:.82rem;text-align:center;margin-top:8px;display:none"></p>
  </div>
</div>

<script>
// ===================== 配置 =====================
var ADMIN_PASSWORD = 'qq2534084227';

// ===================== 登录 =====================
document.getElementById('passwordInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')doLogin();
});

function doLogin(){
  var pwd=document.getElementById('passwordInput').value;
  if(pwd===ADMIN_PASSWORD){
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainApp').style.display='block';
    document.getElementById('loginError').style.display='none';
    loadData();
  }else{
    document.getElementById('loginError').style.display='block';
    document.getElementById('passwordInput').value='';
  }
}

function doLogout(){
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('passwordInput').value='';
}


// ===================== GitHub API 同步配置 =====================
var GITHUB_TOKEN = "YOUR_GITHUB_TOKEN_HERE";
var GITHUB_API = "https://api.github.com/repos/zc2534/li-jian/contents/data/registrations.json";
var githubData = [];

function base64ToUtf8(str) {
  return decodeURIComponent(atob(str).split("").map(function(c) {
    return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(""));
}

function utf8ToBase64(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(m, p1) {
    return String.fromCharCode("0x" + p1);
  }));
}

function fetchFromGitHub(){
  if (GITHUB_TOKEN === "YOUR_GITHUB_TOKEN_HERE") {
    console.log("GitHub Token 未配置，仅使用本地数据");
    return Promise.resolve(null);
  }
  return fetch(GITHUB_API, { headers: { "Authorization": "Bearer " + GITHUB_TOKEN } })
    .then(function(r){
      if(!r.ok) throw new Error("GitHub fetch failed: " + r.status);
      return r.json();
    })
    .then(function(file){
      githubData = JSON.parse(base64ToUtf8(file.content));
      return githubData;
    })
    .catch(function(err){
      console.log("GitHub 读取失败:", err.message);
      return null;
    });
}

function pushToGitHub(data){
  if (GITHUB_TOKEN === "YOUR_GITHUB_TOKEN_HERE") {
    alert("请先在代码中配置 GitHub Token 后再使用云端同步功能。\n\n创建地址：https://github.com/settings/tokens");
    return Promise.reject("token not set");
  }
  // 先获取最新 SHA
  return fetch(GITHUB_API, { headers: { "Authorization": "Bearer " + GITHUB_TOKEN } })
    .then(function(r){ if(!r.ok) throw new Error("GET failed"); return r.json(); })
    .then(function(file){
      var newContent = utf8ToBase64(JSON.stringify(data, null, 2));
      return fetch(GITHUB_API, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + GITHUB_TOKEN, "Content-Type": "application/json" },
        body: JSON.stringify({ message: "同步报名数据 " + new Date().toLocaleString(), content: newContent, sha: file.sha })
      });
    })
    .then(function(r){ return r.json(); });
}

// ===================== 数据操作 =====================
var allData=[];

function loadData(){
  // 先从 GitHub 拉取云端数据，再合并本地
  fetchFromGitHub().then(function(cloudData){
    // 读取本地数据
    var localData = [];
    try{ localData = JSON.parse(localStorage.getItem('lijian_registrations')||'[]'); }catch(e){}

    // 合并：云端 + 本地，按 id 去重
    var seen = {};
    var merged = [];
    var cloudList = cloudData || [];
    [cloudList, localData].forEach(function(arr){
      arr.forEach(function(r){
        var key = r.idCard + '_' + r.campSession;
        if (!seen[key]) { seen[key] = true; merged.push(r); }
      });
    });

    allData = merged.sort(function(a,b){
      return new Date(b.createdAt||0) - new Date(a.createdAt||0);
    });
    updateStats();
    renderTable();
  }).catch(function(){
    // GitHub 失败，降级到纯本地数据
    try{ allData = JSON.parse(localStorage.getItem('lijian_registrations')||'[]'); }catch(e){allData=[]}
    allData.sort(function(a,b){ return new Date(b.createdAt||0) - new Date(a.createdAt||0); });
    updateStats();
    renderTable();
  });
}

function saveData(){
  localStorage.setItem('lijian_registrations',JSON.stringify(allData));
  // 后台尝试推送到 GitHub
  pushToGitHub(allData).catch(function(){});
  loadData();
}

function deleteItem(id){
  if(!confirm('确定删除这条报名记录吗？此操作不可恢复。'))return;
  allData=allData.filter(function(r){return r.id!==id});
  saveData();
}


function syncToCloud(){
  if (allData.length === 0) { alert("暂无数据可同步"); return; }
  if (!confirm("将把当前 " + allData.length + " 条报名数据同步到云端，继续？")) return;
  pushToGitHub(allData).then(function(){
    alert("✅ 云端同步成功！现在其他设备也能看到这些数据了。");
  }).catch(function(err){
    alert("同步失败：" + err.message + "\n\n请检查 GitHub Token 是否正确配置。");
  });
}

function clearAll(){
  if(!confirm('确定清空所有报名数据吗？此操作不可恢复！\n\n建议先导出CSV备份。'))return;
  localStorage.removeItem('lijian_registrations');
  allData=[];
  updateStats();
  renderTable();
}

// ===================== 统计 =====================
function updateStats(){
  document.getElementById('statTotal').textContent=allData.length;
  var today=new Date().toLocaleDateString('zh-CN');
  var todayCount=allData.filter(function(r){
    return (r.createdAt||'').indexOf(today)===0;
  }).length;
  document.getElementById('statToday').textContent=todayCount;
  var males=allData.filter(function(r){return r.gender==='男'}).length;
  var females=allData.filter(function(r){return r.gender==='女'}).length;
  document.getElementById('statGender').textContent=males+' / '+females;
  var sessions={};
  allData.forEach(function(r){
    var s=r.campSession||'未知';
    sessions[s]=(sessions[s]||0)+1;
  });
  var sStr=Object.keys(sessions).map(function(k){return k+':'+sessions[k]}).join(' ');
  document.getElementById('statSessions').textContent=sStr||'-';
  document.getElementById('statSessions').style.fontSize=allData.length>0?'1rem':'1rem';
}

// ===================== 表格渲染 =====================
function renderTable(){
  var sessionFilter=document.getElementById('filterSession').value;
  var nameFilter=(document.getElementById('filterName').value||'').toLowerCase();

  var filtered=allData.filter(function(r){
    if(sessionFilter && r.campSession!==sessionFilter)return false;
    if(nameFilter && (r.name||'').toLowerCase().indexOf(nameFilter)===-1)return false;
    return true;
  });

  var tbody=document.getElementById('tableBody');
  var empty=document.getElementById('emptyState');

  if(filtered.length===0){
    tbody.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';

  var badgeClass=function(s){
    if(!s)return'badge-7';
    if(s.indexOf('7')>=0)return'badge-7';
    if(s.indexOf('14')>=0)return'badge-14';
    if(s.indexOf('21')>=0)return'badge-21';
    if(s.indexOf('28')>=0)return'badge-28';
    return'badge-7';
  };

  tbody.innerHTML=filtered.map(function(r,i){
    var time=r.createdAt||'-';
    return '<tr>'+
      '<td>'+(i+1)+'</td>'+
      '<td><strong>'+esc(r.name)+'</strong></td>'+
      '<td>'+esc(r.gender)+'</td>'+
      '<td>'+r.age+'岁</td>'+
      '<td>'+esc(r.phone)+'</td>'+
      '<td>'+esc(r.parentName)+'</td>'+
      '<td>'+esc(r.parentPhone)+'</td>'+
      '<td><span class="badge '+badgeClass(r.campSession)+'">'+esc(r.campSession||'-')+'</span></td>'+
      '<td style="font-size:.78rem;white-space:nowrap">'+time+'</td>'+
      '<td style="white-space:nowrap">'+
        '<button style="padding:4px 10px;background:#f0ece0;border:1px solid #d5cfc0;border-radius:6px;cursor:pointer;font-size:.78rem;margin-right:4px" onclick="showDetail(\''+r.id+'\')">详情</button>'+
        '<button style="padding:4px 10px;background:#fff0f0;border:1px solid #fcc;border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--red)" onclick="deleteItem(\''+r.id+'\')">删除</button>'+
      '</td>'+
    '</tr>';
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ===================== 详情弹窗 =====================
function showDetail(id){
  var r=allData.find(function(d){return d.id===id});
  if(!r)return;
  var html='<h3>📋 报名详情</h3>'+
    '<div class="row"><span class="key">姓名</span><span class="val">'+esc(r.name)+'</span></div>'+
    '<div class="row"><span class="key">性别</span><span class="val">'+esc(r.gender)+'</span></div>'+
    '<div class="row"><span class="key">年龄</span><span class="val">'+r.age+'岁</span></div>'+
    '<div class="row"><span class="key">身份证</span><span class="val">'+esc(r.idCard)+'</span></div>'+
    '<div class="row"><span class="key">手机号</span><span class="val">'+esc(r.phone)+'</span></div>'+
    '<div class="row"><span class="key">监护人</span><span class="val">'+esc(r.parentName)+'</span></div>'+
    '<div class="row"><span class="key">监护人电话</span><span class="val">'+esc(r.parentPhone)+'</span></div>'+
    '<div class="row"><span class="key">营期</span><span class="val">'+esc(r.campSession||'-')+'</span></div>'+
    '<div class="row"><span class="key">健康情况</span><span class="val">'+esc(r.health||'未填写')+'</span></div>'+
    '<div class="row"><span class="key">备注</span><span class="val">'+esc(r.remarks||'无')+'</span></div>'+
    '<div class="row"><span class="key">报名时间</span><span class="val">'+(r.createdAt||'-')+'</span></div>'+
    '<button class="close-btn" onclick="closeDetail()">关闭</button>';
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailModal').classList.add('active');
}

function closeDetail(){
  document.getElementById('detailModal').classList.remove('active');
}

// ===================== 手动录入 =====================
function openAddForm(){
  ['addName','addGender','addAge','addIdCard','addPhone','addParentName','addParentPhone','addSession','addHealth','addRemarks'].forEach(function(id){
    document.getElementById(id).value='';
  });
  document.getElementById('addError').style.display='none';
  document.getElementById('addModal').classList.add('active');
}

function closeAdd(){
  document.getElementById('addModal').classList.remove('active');
}

function saveAdd(){
  var name=document.getElementById('addName').value.trim();
  var gender=document.getElementById('addGender').value;
  var age=parseInt(document.getElementById('addAge').value);
  var idCard=document.getElementById('addIdCard').value.trim();
  var phone=document.getElementById('addPhone').value.trim();
  var parentName=document.getElementById('addParentName').value.trim();
  var parentPhone=document.getElementById('addParentPhone').value.trim();
  var campSession=document.getElementById('addSession').value;
  var health=document.getElementById('addHealth').value.trim();
  var remarks=document.getElementById('addRemarks').value.trim();

  var errs=[];
  if(!name||name.length<2)errs.push('请填写学员姓名');
  if(!gender)errs.push('请选择性别');
  if(!age||age<6||age>16)errs.push('年龄需在6-16岁');
  if(!idCard||!/^[1-9]\d{5}(19|20)\d{2}(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])\d{3}[\dXx]$/.test(idCard))errs.push('请填写正确的身份证号');
  if(!phone||!/^1[3-9]\d{9}$/.test(phone))errs.push('请填写正确的手机号');
  if(!parentName||parentName.length<2)errs.push('请填写监护人姓名');
  if(!parentPhone||!/^1[3-9]\d{9}$/.test(parentPhone))errs.push('请填写正确的监护人电话');
  if(!campSession)errs.push('请选择营期');

  if(errs.length>0){
    var el=document.getElementById('addError');
    el.textContent=errs.join('；');
    el.style.display='block';
    return;
  }

  allData.unshift({
    id: Date.now().toString(36),
    name: name, gender: gender, age: age, idCard: idCard,
    phone: phone, parentName: parentName, parentPhone: parentPhone,
    health: health, campSession: campSession, remarks: remarks,
    createdAt: new Date().toLocaleString('zh-CN')
  });
  saveData();
  closeAdd();
  alert('✅ 录入成功！');
}

// ===================== 导出 CSV =====================
function exportCSV(){
  if(allData.length===0){alert('暂无数据可导出');return}
  var headers=['姓名','性别','年龄','身份证号','手机号','监护人','监护人电话','营期','健康状况','备注','报名时间'];
  var keys=['name','gender','age','idCard','phone','parentName','parentPhone','campSession','health','remarks','createdAt'];
  var csv='﻿'+headers.join(',')+'\n';
  allData.forEach(function(r){
    csv+=keys.map(function(k){
      var v=String(r[k]||'').replace(/"/g,'""');
      return '"'+v+'"';
    }).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='砺剑夏令营报名数据_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();URL.revokeObjectURL(url);
}
</script>
